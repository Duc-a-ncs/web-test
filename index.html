<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kho đề Toán 12</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .card-hover { 
            transition: all 0.2s ease; 
            -webkit-tap-highlight-color: transparent;
        }
        .card-hover:active { 
            transform: scale(0.97); 
            background-color: #f9fafb;
        }
        /* Tăng kích thước vùng bấm cho điện thoại */
        a {
            min-height: 120px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- 
        👇 DANH SÁCH ĐỀ - THÊM VÀO ĐÂY 👇
        ["tên file.html", "số thứ tự đề", "loại đề"]
    -->
    <script>
        const danhSachDe = [
            ["de 1.HTML", "1","Giữa Học kỳ 2"],
            ["Đề 2 cuối kỳ 2.HTML", "2","Cuoi Học kỳ 2"],
            ["de giua ky 2  đề 3.html", "3","giữa Học kỳ 2"],
            
        ];
        
        // Màu sắc tự động
        const gradients = [
            "from-blue-600 to-cyan-400",
            "from-purple-600 to-pink-500",
            "from-emerald-600 to-teal-400",
            "from-amber-600 to-orange-400",
            "from-rose-600 to-red-400",
            "from-indigo-600 to-blue-400",
            "from-violet-600 to-purple-400",
            "from-fuchsia-600 to-pink-500",
            "from-cyan-600 to-blue-400",
            "from-lime-600 to-green-400",
            "from-orange-600 to-red-500",
            "from-teal-600 to-cyan-400",
            "from-red-600 to-rose-500",
            "from-yellow-600 to-amber-500",
            "from-green-600 to-emerald-500",
            "from-sky-600 to-blue-500",
            "from-pink-600 to-rose-500",
            "from-gray-700 to-gray-500",
            "from-stone-600 to-neutral-500",
            "from-slate-600 to-gray-400"
        ];
    </script>

    <div class="max-w-4xl mx-auto p-4">
        <!-- Tiêu đề - thu nhỏ trên mobile -->
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-800">Đề Ôn Thi TOÁN 12</h1>
        </div>

        <!-- Danh sách đề - grid responsive -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="exam-list"></div>
        
    <script>
        function hienThiDe() {
            const container = document.getElementById('exam-list');
            if (!container) return;
            
            let html = '';
            
            danhSachDe.forEach((de, index) => {
                const file = de[0];
                const soThuTu = de[1];
                const loaiDe = de[2];
                const gradient = gradients[index % gradients.length];
                
                html += `
                    <a href="${file}" 
                       class="bg-white rounded-xl shadow-sm border border-gray-200 card-hover no-underline overflow-hidden">
                        <div class="h-1.5 bg-gradient-to-r ${gradient}"></div>
                        <div class="p-3 text-center flex flex-col items-center justify-center h-full">
                            <div class="text-3xl md:text-4xl font-bold text-gray-700">Đề ${soThuTu}</div>
                            <div class="text-[10px] md:text-xs text-gray-400 mt-1 bg-gray-50 px-2 py-0.5 rounded-full">${loaiDe}</div>
                        </div>
                    </a>
                `;
            });
            
            container.innerHTML = html;
        }
        
        document.addEventListener('DOMContentLoaded', hienThiDe);
    </script>
</body>
</html>
